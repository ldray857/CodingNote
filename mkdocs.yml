# 1. 站点基础信息
site_name: GIS & CS | CodingNote
site_description: 关于 GIS、CS 与 AI 的一些记录
site_author: Lucas
site_url: https://ldray857.github.io/CodingNote/
edit_uri: edit/main/docs/

# 2. 仓库链接
repo_name: ldray857/CodingNote
repo_url: https://github.com/ldray857/CodingNote

# 3. 主题配置 (核心审计区)
theme:
  name: material
  language: zh
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo        
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    - navigation.sections    # 侧边栏分段显示
    - navigation.expand      # 默认展开
    - navigation.top         # 回到顶部按钮
    - search.suggest         # 搜索建议
    - search.highlight       # 搜索高亮
    - content.code.copy      # 代码一键复制


# =========================================================
# 4. 导航栏配置
# =========================================================
nav:
  - 🏠 首页: index.md
  - 🛠️ 工具使用与配置:
      - 工具概览: tools/index.md
      - IDE 相关配置: tools/as_IDE/index.md
      - 头部公司与编译器: tools/as_cmp/index.md
  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
  - ⚡ AI 工程:
      - 实践心得: AI/index.md
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      - 环境联动: tools/as_IDE/VS3/index.md
  - 🐍 Python 工程实践:
      - 环境管理: python/index.md
  - 🌍 GIS 算法与实践:
      - 空间分析与自动化: GIS/index.md
  - 🌐 Web 开发工程:
      - 开发概览: web_dev/index.md



# 5. Markdown 增强插件
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

# 6. 额外资源引用 (必须顶格写)
extra:
  # 虽然我们用了 overrides 硬编码，但保留此项可作为元数据备份
  announcement: "身如柳絮随风扬，无论云泥意贯一。 ——— 柳贯一"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
