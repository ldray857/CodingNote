# =========================================================
# 1. 站点基础信息
# =========================================================
site_name: GIS & CS | CodingNote
site_description: 关于 GIS、CS 与 AI 的记录
site_author: Lucas
site_url: https://ldray857.github.io/CodingNote/
edit_uri: edit/main/docs/

# =========================================================
# 2. 仓库链接
# =========================================================
repo_name: ldray857/CodingNote
repo_url: https://github.com/ldray857/CodingNote

# =========================================================
# 3. 主题配置 (Material for MkDocs)
# =========================================================
theme:
  name: material
  language: zh
  favicon: assets/favicon.png
  logo: assets/favicon.png
  
  # 配色方案 (浙大蓝风格)
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式

  # 主题功能开关
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

# =========================================================
# 4. 导航栏配置
# =========================================================
nav:
  - 🏠 首页: index.md
  - 🛠️ 工具使用与配置:
      - 工具概览: tools/index.md
      - IDE 相关配置: tools/as_IDE/index.md
      - 头部公司与编译器: tools/as_cmp/index.md
  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
  - ⚡ AI 工程:
      - 实践心得: AI/index.md
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      - 环境联动: tools/as_IDE/VS3/index.md
  - 🐍 Python 工程实践:
      - 环境管理: python/index.md
  - 🌍 GIS 算法与实践:
      - 空间分析与自动化: GIS/index.md
  - 🌐 Web 开发工程:
      - 开发概览: web_dev/index.md

# =========================================================
# 5. Markdown 语法增强
# =========================================================
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

# =========================================================
# 6. 自定义额外资源 (核心修复区)
# =========================================================
# 注意：extra 必须顶格，且与 site_name 处于同一层级
extra:
  announcement: "身如柳絮随风扬，无论云泥意贯一。 ——— 柳贯一"

# 注意：这些引用必须在 extra 块之外，同样顶格
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
