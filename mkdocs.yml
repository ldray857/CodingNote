# =========================================================
# 1. 站点基础信息 (Global Settings)
# =========================================================
site_name: GIS & CS | CodingNote     # 网站标题，显示在浏览器标签和左上角
site_description: 关于 GIS、CS 与 AI 的一些记录 # 网站描述，有利于 SEO
site_author: Lucas                   # 你的大名
site_url: https://ldray857.github.io/CodingNote/  # 部署后的线上地址
edit_uri: edit/main/docs/            # 允许用户（或你自己）直接从网页点击“编辑此页”

# =========================================================
# 2. 仓库链接 (Repository Integration)
# =========================================================
repo_name: CodingNote                # 右上角显示的 GitHub 项目名称
repo_url: https://github.com/ldray857/CodingNote # 你的代码仓库地址

# =========================================================
# 3. 主题配置 (Theme UI Customization)
# =========================================================
theme:
  name: material                     # 使用目前最强的 Material for MkDocs 主题
  language: zh                       # 界面语言设为中文（搜索、按钮等）
  favicon: assets/favicon.png        # 浏览器标签页小图标
  logo: assets/favicon.png           # 网站左上角图标
  
  # 配色方案：支持浅色/深色模式手动或自动切换
  palette: 
    - media: "(prefers-color-scheme: light)" # 浅色模式设置
      scheme: default
      primary: indigo                # 导航栏底色（浙大蓝风格）
      accent: indigo                 # 链接、按钮点击时的强调色
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"  # 深色模式设置
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式

  # 主题特性开关
  features:
    # - navigation.tabs              # (已禁用) 开启后一级分类会显示在顶部蓝色条上
    - navigation.sections            # 侧边栏菜单分组显示（加粗显示一级目录）
    - navigation.expand              # 页面加载时自动展开所有侧边栏子项
    - navigation.top                 # 开启右下角“回到顶部”按钮
    - search.suggest                 # 搜索时显示实时建议
    - search.highlight               # 搜索关键词在正文中高亮显示
    - content.code.copy              # 代码块右上角显示“一键复制”按钮

# =========================================================
# 4. 导航栏配置 (Navigation Map)
# 这里的结构决定了你左侧菜单的顺序
# =========================================================
nav:
  - 🏠 首页: index.md
  - 🛠️ 工具使用与配置:
      - 工具概览: tools/index.md
      - IDE 相关配置: tools/as_IDE/index.md
      - 头部公司与编译器: tools/as_cmp/index.md
  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
  - ⚡ AI 工程:
      - 实践心得: AI/index.md
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      - 环境联动: tools/as_IDE/VS3/index.md
  - 🐍 Python 工程实践:
      - 环境管理: python/index.md
  - 🌍 GIS 算法与实践:
      - 空间分析与自动化: GIS/index.md
  - 🌐 Web 开发工程:
      - 开发概览: web_dev/index.md

# =========================================================
# 5. Markdown 语法增强 (Extensions)
# =========================================================
markdown_extensions:
  - admonition                       # 支持 !!! info 这种漂亮的提示框
  - pymdownx.details                 # 支持 ??? note 这种可折叠的提示框
  - pymdownx.superfences             # 支持在提示框里嵌套代码块
  - pymdownx.inlinehilite            # 支持行内代码高亮
  - pymdownx.magiclink               # 自动将 URL 识别为可点击的超链接
  - pymdownx.arithmatex:             # 数学公式渲染 (GIS 与 AI 必备)
      generic: true
  - pymdownx.tasklist:               # 支持 - [ ] 待办清单
      custom_checkbox: true
  - tables                           # 标准 Markdown 表格支持
  - toc:
      permalink: true                # 每个标题右侧显示“¶”链接锚点

# =========================================================
# 6. 自定义额外资源 (Extra Assets)
# =========================================================
extra:
  # 顶部公告栏内容 (柳贯一名言)
  # 注意：这里去掉了中文引号，使用了标准的英文引号
  announcement: "身如柳絮随风扬，无论云泥意贯一。 ——— 柳贯一"

# 引用外部 CSS (侧边线、卡片感、滚动条优化)
#extra_css:
#  - stylesheets/extra.css

# 引用外部 JS (数学公式渲染)
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
