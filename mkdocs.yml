# 1. 基本信息
site_name: GIS & CS | CodingNote
site_description: 一份关于GIS、CS 与 AI 的记录
site_author: Lucas
site_url: https://ldra857.github.io/CodingNote/
edit_uri: edit/main/docs/

# 2. 仓库链接（右上角会显示 GitHub 图标）
repo_name: CodingNote
repo_url: https://github.com/ldray857/CodingNote

# 3. 主题配置
theme:
  name: material
  language: zh
  favicon: assets/favicon.png # 如果有图标可以放在这里
  logo: assets/avatar.jpg
  palette: 
    # 自动切换深/浅模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # 浙大蓝风格
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    - navigation.tabs           # 顶部一级分类
    - navigation.sections       # 侧边栏分组
    - navigation.expand         # 默认展开
    - navigation.top            # 回到顶部按钮
    - search.suggest            # 搜索建议
    - search.highlight          # 搜索关键词高亮
    - content.code.copy         # 代码块一键复制
extra_css:
  - stylesheets/extra.css

# 4. 导航栏配置（精准匹配最新文件目录）
nav:
  - 🏠 首页:
      - 🚀 门户中心: index.md
      - 📝 关于作者: about.md
      - 🕒 快速导航:
          - 工具配置: tools/index.md
          - 电脑配置: CS/index.md
          - AI 工程: AI/index.md
          - GIS 工程: GIS/index.md
          - Python: python/index.md
          - C/C++: c_cpp/index.md

  - 🛠️ 工具使用与配置:
      - 工具箱概览: tools/index.md
      - IDE 配置 (VS Code/VS): 
          - 概览: tools/as_IDE/01_intro.md
          - Visual Studio 实践: tools/as_IDE/02_VS_01.md
      - GIS 工具集:
          - 环境概览: tools/as_GIS/01_intro.md
          - GeoServer 部署: tools/as_GIS/02_GeoServer.md
          - ArcGIS 全家桶: tools/as_GIS/03_ArcGIS_01.md
          - ArcGIS Pro 进阶: tools/as_GIS/03_ArcGIS_02.md
      - 计算机基础 (CS):
          - 导论: tools/cs/01_introduction.md
          - 文件管理: tools/cs/02_file_management.md

  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
      
  - ⚡ AI 工程:
      - 实践心得: AI/index.md
      
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      
  - 🐍 Python 工程实践:
      - python 概览: python/index.md
      - 基础用法:
          - 01 简介: python/basic/01_intro.md
