          - 04 数值计算: python/basic/04_num.md
          - 05 运算符: python/basic/05_cacul.md
          - 06 布尔类型: python/basic/06_bool.md
          - 内存机制 (RAM): python/basic/ram.md
      
  - 🌍 GIS 算法与实践:
      - GIS概述: GIS/index.md
      - GIS 开发实践: 
          - 基础入门: GIS/GIS_DEV/01_intro.md
          - 空间数据发布 (上): GIS/GIS_DEV/04_data_distribute_1.md
          - 空间数据发布 (下): GIS/GIS_DEV/04_data_distribute_2.md
      
  - 🌐 Web 开发工程:
      - 开发概览: web_dev/index.md
      - JavaScript 专题:
          - 01 简介: web_dev/JavaScipt/01_简介.md
          - 02 基础: web_dev/JavaScipt/02_基础.md
          - 03 数据类型: web_dev/JavaScipt/03数据类型.md
          - 04 作用域和事件: web_dev/JavaScipt/04_作用域和事件.md
          - DOM 操作: web_dev/JavaScipt/DOM.md

# 5. Markdown 增强插件（支持公式、警告框、复杂表格）
markdown_extensions:
  - admonition            # 提示框 !!! info
  - pymdownx.details      # 折叠块 ??? note
  - pymdownx.superfences  # 嵌套代码块
  - pymdownx.inlinehilite # 行内代码高亮
  - pymdownx.magiclink    # 自动识别链接
  - pymdownx.arithmatex:  # 数学公式支持 (GIS 学术必备)
      generic: true
  - pymdownx.tasklist:    # 待办事项列表
      custom_checkbox: true
  - tables                # 标准表格
  - toc:
      permalink: true     # 标题右侧锚点

# 6. 额外的 JS/CSS（用于渲染数学公式等）
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
