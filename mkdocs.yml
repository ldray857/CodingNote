# 1. 站点基础信息
site_name: GIS & CS | CodingNote
site_description: 关于 GIS、CS 与 AI 的一些记录
site_author: Lucas
site_url: https://ldray857.github.io/CodingNote/
edit_uri: edit/main/docs/

# 2. 仓库链接
repo_name: ldray857/CodingNote
repo_url: https://github.com/ldray857/CodingNote

# 3. 主题配置 (核心审计区)
theme:
  name: material
  custom_dir: overrides      # 【关键】必须指向根目录下的 overrides 文件夹
  language: zh
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo        
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    - navigation.sections    # 侧边栏分段显示
    - navigation.expand      # 默认展开
    - navigation.top         # 回到顶部按钮
    - search.suggest         # 搜索建议
    - search.highlight       # 搜索高亮
    - content.code.copy      # 代码一键复制

# 4. 导航栏配置 (Nav)
# 保持你目前的 nav 结构即可，注意缩进对齐

# 5. Markdown 增强插件
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

# 6. 额外资源引用 (必须顶格写)
extra:
  # 虽然我们用了 overrides 硬编码，但保留此项可作为元数据备份
  announcement: "身如柳絮随风扬，无论云泥意贯一。 ——— 柳贯一"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
