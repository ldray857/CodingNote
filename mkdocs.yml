# 1. 基本信息
site_name: GIS & CS | CodingNote
site_description: 一份关于 GIS、CS 与 AI 的记录
site_author: Lucas
site_url: https://ldray857.github.io/CodingNote/  # 请确认 ldra857 是否正确
edit_uri: edit/main/docs/

# 2. 仓库链接
repo_name: CodingNote
repo_url: https://github.com/ldray857/CodingNote # 建议与 site_url 保持一致

# 3. 主题配置
theme:
  name: material
  language: zh
  favicon: assets/favicon.png # 建议用我们设计的那个 SVG，显示更锐利
  logo: assets/favicon.png
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo 
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    # - navigation.tabs           # <-- 必须删掉/注释掉这行，导航才会回到左侧
    - navigation.sections       # 侧边栏分组，配合左侧导航非常美观
    - navigation.expand         # 默认展开
    - navigation.top            # 回到顶部
    - search.suggest
    - search.highlight
    - content.code.copy

# 重点：引用的外部文件
extra_css:
  - stylesheets/extra.css

# 4. 导航栏配置（保持不变，你的路径写得很对）
nav:
  - 🏠 首页: index.md
  - 🛠️ 工具使用与配置:
      - 工具概览: tools/index.md
      - IDE 相关配置: tools/as_IDE/index.md
      - CS 巨头与编译器: tools/as_cmp/index.md
  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
  - ⚡ AI 工程:
      - 实践心得: AI/index.md
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      - 环境联动: tools/as_IDE/VS3/index.md
  - 🐍 Python 工程实践:
      - 环境管理: python/index.md
  - 🌍 GIS 算法与实践:
      - 空间分析与自动化: GIS/index.md
  - 🌐 Web 开发工程:
      - 开发览: web_dev/index.md

# 5. 增强插件与 JS（保持不变）
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
